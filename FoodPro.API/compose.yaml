services:
  api:
    image: foodpro-api
    container_name: foodpro-api
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      JwtSettings__SecretKey: ${JWT_SECRET}
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: foodpro-postgres
    environment:
      POSTGRES_DB: foodpro
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: