services:
  api:
    image: foodpro-api
    container_name: foodpro-api
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=foodpro;Username=postgres;Password=1234"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: foodpro-postgres
    environment:
      POSTGRES_DB: foodpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: